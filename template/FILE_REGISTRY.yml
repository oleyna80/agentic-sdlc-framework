# Machine-readable navigation registry for important files and path patterns.
# It is intentionally selective: register authority-bearing files and major
# project zones, not every file.

version: 1
scope: generated_project
project:
  name: "{{PROJECT_NAME}}"
  slug: "{{PROJECT_SLUG}}"
  root: "{{PROJECT_ROOT}}"

statuses:
  normative: "source of truth or policy-bearing file"
  runtime: "runtime-specific agent configuration"
  reference: "background knowledge; does not override policy"
  example: "illustrative scenario; not mandatory policy"
  log: "evidence/history; not current authority"
  derived: "generated or discovered from other sources"
  local_state: "machine-local or runtime state; do not publish by default"
  source: "project source code or tests"

authority_order:
  - explicit_owner_instruction
  - AGENTS.md
  - approved_work_block_plan
  - PROJECT_MAP.md
  - FILE_REGISTRY.yml
  - runtime_policy_files
  - reference_docs_examples_logs_generated_artifacts

entries:
  AGENTS.md:
    role: root_agent_policy
    status: normative
    owner: owner
    update_when:
      - role permissions change
      - approval gates change
      - project source boundaries change
    related:
      - PROJECT_MAP.md
      - FILE_REGISTRY.yml
      - docs/session-bootstrap.md

  PROJECT_MAP.md:
    role: human_readable_project_map
    status: normative
    owner: architect
    update_when:
      - major directories change
      - authority model changes
      - runtime layers change
      - generated or local-only boundaries change
    related:
      - FILE_REGISTRY.yml
      - docs/session-bootstrap.md

  FILE_REGISTRY.yml:
    role: machine_readable_navigation_registry
    status: normative
    owner: architect
    update_when:
      - key files or path patterns are added moved or removed
      - file authority status changes
      - update triggers change
    related:
      - PROJECT_MAP.md
      - docs/session-bootstrap.md

  docs/session-bootstrap.md:
    role: new_session_intake_flow
    status: normative
    owner: architect
    update_when:
      - new-session read order changes
      - git or diff preflight changes
      - memory usage policy changes
    related:
      - PROJECT_MAP.md
      - FILE_REGISTRY.yml

  docs/templates/work-block-template.md:
    role: work_block_template
    status: normative
    owner: orchestrator
    update_when:
      - Work Block planning requirements change
      - closeout requirements change
      - verification evidence requirements change
    related:
      - docs/session-bootstrap.md
      - memory_bank/orchestrator-log.md

  scripts/bootstrap.sh:
    role: workflow_layer_health_check
    status: normative
    owner: verifier
    update_when:
      - required workflow files change
      - project navigation files change
      - bootstrap health check behavior changes
    related:
      - PROJECT_MAP.md
      - FILE_REGISTRY.yml
      - docs/session-bootstrap.md

  .codex/**:
    role: codex_runtime_policy
    status: runtime
    owner: orchestrator
    update_when:
      - Codex write gate changes
      - Codex critic contract changes
      - local hook policy changes
    related:
      - AGENTS.md
      - memory_bank/orchestrator-log.md
      - memory_bank/review-log.md

  .agent/**:
    role: runtime_neutral_agent_routing
    status: normative
    owner: architect
    update_when:
      - roster changes
      - workflow routing changes
      - skill list changes
      - gate policy changes
    related:
      - AGENTS.md
      - .agent/workflows/sdd-protocol.md

  .claude/**:
    role: claude_code_team_runtime
    status: runtime
    owner: architect
    update_when:
      - Claude Code agents change
      - hooks change
      - settings or MCP boundaries change
      - per-agent memory policy changes
    related:
      - CLAUDE.md
      - .mcp.json
      - memory_bank/external-team-log.md

  memory_bank/context.md:
    role: durable_project_context
    status: normative
    owner: orchestrator
    update_when:
      - project focus changes
      - durable context is learned and verified
    related:
      - memory_bank/progress.md
      - memory_bank/decisions.md

  memory_bank/orchestrator-log.md:
    role: orchestrator_decision_log
    status: log
    owner: orchestrator
    update_when:
      - significant orchestration decision is made
      - Work Block needs audit trail
    related:
      - .codex/critic.md
      - docs/plans/**

  memory_bank/review-log.md:
    role: critic_reviewer_verifier_log
    status: log
    owner: reviewer
    update_when:
      - critic review runs
      - verifier review runs
      - review findings are resolved
    related:
      - .codex/critic.md
      - .agent/critic-gate.md
      - .agent/verification-gate.md

  memory_bank/external-team-log.md:
    role: external_team_delivery_log
    status: log
    owner: orchestrator
    update_when:
      - Claude Code or another external team is delegated work
      - handoff result is reviewed
    related:
      - .claude/**
      - handoff task files if installed

  docs/plans/**:
    role: work_block_plans
    status: log
    owner: orchestrator
    update_when:
      - Work Block is planned or closed
    related:
      - docs/templates/work-block-template.md

  docs/specs/**:
    role: specifications
    status: normative
    owner: architect
    update_when:
      - product or technical contract changes
    related:
      - docs/tasklist/**
      - docs/plans/**

  docs/reports/**:
    role: reports_and_verification_evidence
    status: log
    owner: verifier
    update_when:
      - verification or review report is created
    related:
      - docs/plans/**
      - memory_bank/review-log.md

  source_directories:
    role: project_source_code
    status: source
    owner: coder
    patterns:
      - "{{SOURCE_DIRS}}"
    update_when:
      - approved Work Block includes source changes
    related:
      - AGENTS.md
      - docs/specs/**
      - docs/tasklist/**

  generated_outputs:
    role: build_cache_generated_artifacts
    status: derived
    owner: tooling
    patterns:
      - node_modules/**
      - .next/**
      - dist/**
      - build/**
      - coverage/**
      - graphify-out/**
    update_when:
      - generated by tools only
    related:
      - .gitignore

  local_secrets:
    role: local_credentials_and_environment
    status: local_state
    owner: owner
    patterns:
      - .env
      - .env.*
      - "*.pem"
      - "*.key"
      - secrets/**
      - credentials/**
    update_when:
      - never commit; rotate through approved secret process
    related:
      - .gitignore
